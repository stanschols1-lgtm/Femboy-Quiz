<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Femboy Quiz Deluxe</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1a1a2e, #2a1f3d);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 500px;
        background: rgba(255, 255, 255, 0.05);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
        text-align: center;
    }

    .progress-bar {
        height: 10px;
        background: #333;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px;
    }

    .progress {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, pink, violet);
        transition: width 0.4s ease;
    }

    .question {
        font-size: 20px;
        margin-bottom: 20px;
        min-height: 60px;
        transition: opacity 0.3s;
    }

    .answers button {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff9ecf, #c084fc);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
    }

    .answers button:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .answers button.selected {
        outline: 3px solid #6a0dad;
        box-shadow: 0 0 12px #6a0dad;
        transform: scale(1.05);
    }

    .next-btn {
        margin-top: 15px;
        padding: 10px;
        width: 100%;
        border: none;
        border-radius: 10px;
        background: #444;
        color: white;
        cursor: pointer;
    }

    .character {
        width: 120px;
        margin-bottom: 15px;
        border-radius: 15px;
    }

    #result {
        font-size: 22px;
        margin-top: 20px;
    }
</style>
</head>
<body>

<div class="container">
    <img class="character" src="https://i.imgur.com/6VBx3io.png">

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="question" id="question"></div>

    <div class="answers">
        <button onclick="selectAnswer(2, this)">Yes</button>
        <button onclick="selectAnswer(1, this)">Maybe</button>
        <button onclick="selectAnswer(0, this)">No</button>
    </div>

    <button class="next-btn" onclick="nextQuestion()">Next</button>

    <div id="result"></div>
</div>

<script>
const questions = [
"Do you like oversized hoodies?",
"Do you enjoy cute aesthetics?",
"Do you wear thigh-high socks?",
"Do you like pastel colors?",
"Do you enjoy anime?",
"Do you like skirts?",
"Do you care about skincare?",
"Do you like being called cute?",
"Do you prefer soft music?",
"Do you enjoy selfies?",
"Do you like long hair styles?",
"Do you follow fashion trends?",
"Do you enjoy roleplay aesthetics?",
"Do you like plushies?",
"Do you enjoy makeup?",
"Do you prefer comfort over toughness?",
"Do you like cat ear accessories?",
"Do you enjoy TikTok trends?",
"Do you like soft lighting?",
"Do you enjoy romantic vibes?",
"Do you like oversized sleeves?",
"Do you prefer staying inside?",
"Do you enjoy decorating your space?",
"Do you like cute emojis?",
"Do you enjoy attention online?",
"Do you like pastel pink?",
"Do you enjoy expressive outfits?",
"Do you like aesthetic photos?",
"Do you enjoy compliments?",
"Do you like soft blankets?"
];

let current = 0;
let score = 0;
let selected = null;

function loadQuestion() {
    const q = document.getElementById("question");

    q.style.opacity = 0;

    setTimeout(() => {
        q.innerText = questions[current];
        q.style.opacity = 1;

        document.getElementById("progress").style.width =
            ((current / questions.length) * 100) + "%";
    }, 200);
}

function selectAnswer(value, button) {
    selected = value;

    const buttons = document.querySelectorAll(".answers button");
    buttons.forEach(btn => btn.classList.remove("selected"));

    button.classList.add("selected");
}

function nextQuestion() {
    if (selected === null) return;

    score += selected;
    selected = null;
    current++;

    const buttons = document.querySelectorAll(".answers button");
    buttons.forEach(btn => btn.classList.remove("selected"));

    if (current < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.querySelector(".answers").style.display = "none";
    document.querySelector(".next-btn").style.display = "none";
    document.getElementById("progress").style.width = "100%";

    let resultText = "";

    if (score > 50) {
        resultText = "💅 At this point it’s not a phase, it’s a lifestyle.";
    } else if (score > 40) {
        resultText = "So you def have the vibes, but not the clothes :3";
    } else if (score > 30) {
        resultText = "Boy, we all know you're secretly a femboy but not certified :P";
    } else if (score > 20) {
        resultText = "😌 You got the spirit but you're still in denial";
    } else {
        resultText = "🗿 Not really a femboy but you tried";
    }

    // 💜 percentage calculation
    let percentage = (score / 60) * 100;

    let formatted = percentage % 1 === 0
        ? percentage.toFixed(0)
        : percentage.toFixed(1);

    formatted = formatted.replace(".", ",");

    document.getElementById("question").innerText = "Quiz Complete!";
    document.getElementById("result").innerText =
        resultText + " (" + formatted + "%)";
}

loadQuestion();
</script>

</body>
</html>
